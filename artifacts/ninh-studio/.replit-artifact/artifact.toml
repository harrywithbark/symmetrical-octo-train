kind = "web"
previewPath = "/"
title = "Ninh Studio"
version = "1.0.0"
id = "artifacts/ninh-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20347

[services.development]
run = "pnpm --filter @workspace/ninh-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ninh-studio", "run", "build" ]
publicDir = "artifacts/ninh-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20347"
BASE_PATH = "/"
